{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Relatórios do Sistema</h2>
    <p class="text-muted">Visão geral da performance de atendimento.</p>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Tickets Abertos</h5>
                    <p class="card-text fs-2">--</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5 class="card-title">Concluídos</h5>
                    <p class="card-text fs-2">--</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning mb-3">
                <div class="card-body">
                    <h5 class="card-title">Em Andamento</h5>
                    <p class="card-text fs-2">--</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="alert alert-info mt-4">
        Os dados estatísticos detalhados estarão disponíveis após a coleta de métricas de atendimento.
    </div>
</div>
{% endblock %}
