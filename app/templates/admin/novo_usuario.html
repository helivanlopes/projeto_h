{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center">Cadastrar Novo Usuário</h2>
        <form method="POST" class="mt-4">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" name="nome" id="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="senha" class="form-label">Senha Temporária</label>
                <input type="password" name="senha" id="senha" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="papel" class="form-label">Papel / Nível de Acesso</label>
                <select name="papel" id="papel" class="form-select" required>
                    <option value="admin">Administrador</option>
                    <option value="gestor">Gestor</option>
                    <option value="atendente">Atendente</option>
                    <option value="cliente">Cliente</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">Criar Usuário</button>
                <a href="{{ url_for('main.gerenciar_equipe') }}" class="btn btn-secondary w-100">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
